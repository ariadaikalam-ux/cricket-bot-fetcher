name: Cricket Bot x

on:
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit state.json + twscrape_accounts.db back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ---------------------------------------------------------------
      # ONE-TIME SETUP: Add accounts from the TW_ACCOUNTS secret.
      # This runs every time but add_account is idempotent — safe to repeat.
      # After the first run, the DB is committed to the repo so accounts
      # persist across runs without needing to re-login every time.
      # ---------------------------------------------------------------
      - name: Add/sync Twitter accounts
        env:
          TW_ACCOUNTS: ${{ secrets.TW_ACCOUNTS }}
        run: python manage_accounts.py add-from-env

      # Login only if the DB has accounts that aren't logged in yet.
      # Once logged in, the DB stores cookies — this is a no-op on subsequent runs.
      - name: Login Twitter accounts (if needed)
        run: python manage_accounts.py login

      - name: Run bot
        env:
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          IMGUR_CLIENT_ID:     ${{ secrets.IMGUR_CLIENT_ID }}
          TWITTER_ACCOUNTS:    ${{ vars.TWITTER_ACCOUNTS }}
          TWEET_THRESHOLD:     ${{ vars.TWEET_THRESHOLD }}
          DRY_RUN:             ${{ vars.DRY_RUN }}
          DEBUG:               ${{ vars.DEBUG }}
          INSTAGRAM_CAPTION_0: ${{ vars.INSTAGRAM_CAPTION_0 }}
          INSTAGRAM_CAPTION_1: ${{ vars.INSTAGRAM_CAPTION_1 }}
        run: python bot.py

      # Commit state.json and twscrape_accounts.db back to repo
      # so they persist across runs (this is the "storage" for GitHub Actions)
      - name: Commit state + accounts DB
        run: |
          git config user.name  "cricket-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json twscrape_accounts.db || true
          git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push
