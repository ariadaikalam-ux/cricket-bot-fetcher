name: cricket-bot

on:
  schedule:
    - cron: "0 * * * *"   # every 1 hour (UTC)
  workflow_dispatch:

concurrency:
  group: cricket-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run bot
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          TWITTER_ACCOUNTS: "mufaddal_vohra,criccrazyjohns,academy_dinda"
          TWEET_THRESHOLD: "10"
          DRY_RUN: "0"
        run: python bot.py

      - name: Commit updated state.json
        run: |
          git config user.name "cricket-bot"
          git config user.email "cricket-bot@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update bot state"
          git push
