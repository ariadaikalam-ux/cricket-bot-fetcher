name: cricket-bot
on:
  workflow_dispatch:
concurrency:
  group: cricket-bot
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run bot (fetch + screenshot + imgur only)
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          IMGUR_CLIENT_ID:    ${{ secrets.IMGUR_CLIENT_ID }}
          TWITTER_ACCOUNTS: "mufaddal_vohra,cricketgyann,wxtreme18,rcbtweets,chennaiipl,ctrlmemes_,mipaltan,criccrazyjohns,cricketcentrl,tuktuk_academy,shebas_10dulkar,gemsofcricket,mohalimonster,mahi_patel_07,1no_aalsi_,vipintiwari952,justtalkcricket,vikrant_1589,selflesscricket"
          THRESHOLD: "9"
          DRY_RUN: "0"
          DEBUG: "1"
          SHOW_STATS: "1"
        run: python bot.py

      # Note: bot.py now handles its own git push of pending_post.json + state.json
      # No separate commit step needed here
