name: Test screenshot.js

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run screenshot.js
        run: |
          cat > tweet.json << 'JSON'
          {"id_str":"2025547400300171566","user":{"screen_name":"TukTuk_Academy"}}
          JSON

          node screenshot.js "$(cat tweet.json)" out.png
          ls -lah

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: tweet_screenshot
          path: |
            out.png
            out.jpg
            *.png
            *.jpg
